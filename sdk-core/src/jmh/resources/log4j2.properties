# Benchmarks run with logging fully OFF: log appends (especially at the tests' TRACE level, whose
# log4j2.properties is on the jmh classpath via test.output) otherwise dominate the per-op cost and
# flood the JMH output. The jmh task points log4j2.configurationFile at this file so it wins over the
# test config regardless of classpath order.
status = off
rootLogger.level = off
