name: Tests

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: sdk-core/src/main/rust

      - name: Pull Restate docker image
        run: docker pull ghcr.io/restatedev/restate:main

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Test results
          path: "**/test-results/test/*.xml"

  test-javadocs:
    name: Test Javadocs and dokka
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: sdk-core/src/main/rust

      - name: Build Javadocs
        run: gradle :sdk-aggregated-javadocs:javadoc
      - name: Build Kotlin docs
        run: gradle :dokkaGenerate

  event_file:
    name: "Event File"
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 10
    steps:
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: Event File
          path: ${{ github.event_path }}
